name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Configure base path and site URL
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "BASE_PATH=" >> "$GITHUB_ENV"
            echo "SITE_URL=https://${OWNER}.github.io" >> "$GITHUB_ENV"
          elif [ -f CNAME ]; then
            HOST="$(sed 's/^[[:space:]]*//; s/[[:space:]]*$//' CNAME)"
            HOST="${HOST//$'\r'/}"
            echo "BASE_PATH=" >> "$GITHUB_ENV"
            echo "SITE_URL=https://${HOST}" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/${REPO}" >> "$GITHUB_ENV"
            echo "SITE_URL=https://${OWNER}.github.io/${REPO}" >> "$GITHUB_ENV"
          fi
      - run: npm ci
      - run: npm run build
      - name: Copy CNAME for GitHub Pages
        if: hashFiles('CNAME') != ''
        run: cp CNAME _site/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
